#################### Spring設定 ####################
# 指定現在要用的profile
spring.profiles.active: development, NOTIFY_TEST

# EMBEDDED SERVER CONFIGURATION (ServerProperties)
server.contextPath: /ewallet-manage
server.port: 8070

# JPA (JpaBaseConfiguration, HibernateJpaAutoConfiguration)
spring.jpa.database-platform: com.cht.commons.persistence.hibernate.dialect.SQLServer2012UnicodeDialect
spring.jpa.hibernate.naming.strategy: org.hibernate.cfg.EJB3NamingStrategy
spring.jpa.properties.jadira.usertype.autoRegisterUserTypes: true

# ENDPOINTS (AbstractEndpoint subclasses)
endpoints.enabled: false

# INTERNATIONALIZATION (MessageSourceAutoConfiguration)
spring.messages.basename: i18n/messages

# MULTIPART (MultipartProperties)
spring.http.multipart.maxFileSize: 10Mb
# JAVA端最大檔案大小設定 (將上面spring.http.multipart.maxFileSize大小乘1024乘1024)
ewallet.max.file.size: 10485760

spring.http.multipart.maxRequestSize: 20Mb

# JACKSON (JacksonProperties)
spring.jackson.serialization.write_dates_as_timestamps: false

# Email (MailProperties)
spring.mail.host: 10.160.1.50
spring.mail.port: 25
#spring.mail.username:
#spring.mail.password:
#spring.mail.properties.mail.smtp.auth: true
#spring.mail.properties.mail.smtp.starttls.enable: true

#################### CHT設定 ####################
