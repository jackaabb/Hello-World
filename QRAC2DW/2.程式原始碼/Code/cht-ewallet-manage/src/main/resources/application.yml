cht.application.id: ewallet-manage

# 系統名稱
cht.application.name: 兆豐銀行QRCode行動支付後台管理系統

# 可忽略認證的PATH
cht.security.ignored: /plugins/**,/docs/**,/files/**,/scripts/**,/assets/**,/styles/**,/images/**,/applets/**,/ssoAuth401,/401,/403,/404,/500,/**/favicon.ico,/api-cht/properties/front-end,/ws/**,/generateCaptcha/**,/echoTest,/api/system/**
